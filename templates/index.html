<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Snip — a clean, fast URL shortener. Shorten any link in one click." />
  <title>Snip · URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <header class="header">
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">Snip</span>
    </div>
    <nav class="nav-links">
      <a href="/" id="nav-home">Home</a>
      <a href="#stats-section" id="nav-stats">Stats</a>
    </nav>
  </header>

  <main class="main">
    <!-- Hero Section -->
    <section class="hero">
      <h1 class="hero-title">
        Short links,<br />
        <span class="gradient-text">big impact.</span>
      </h1>
      <p class="hero-sub">
        Lightning-fast URL shortening. Track clicks. Custom aliases. No signup needed.
      </p>
    </section>

    <!-- Shortener Card -->
    <section class="card" id="shortener-card" aria-label="URL Shortener">
      <form id="shorten-form" novalidate>
        <div class="input-group">
          <input
            type="url"
            id="long-url-input"
            name="long_url"
            placeholder="Paste your long URL here…"
            autocomplete="off"
            spellcheck="false"
            aria-label="Long URL input"
            required
          />
          <button type="submit" id="shorten-btn" class="btn-primary">
            <span id="btn-label">Shorten</span>
            <span id="btn-spinner" class="spinner hidden" aria-hidden="true"></span>
          </button>
        </div>

        <!-- Advanced options (collapsible) -->
        <div class="advanced-toggle">
          <button type="button" id="toggle-advanced" aria-expanded="false">
            Advanced options <span class="chevron">▾</span>
          </button>
        </div>
        <div class="advanced-panel hidden" id="advanced-panel">
          <div class="advanced-grid">
            <div class="field-group">
              <label for="alias-input">Custom alias</label>
              <div class="alias-wrapper">
                <span class="alias-prefix">snip/</span>
                <input
                  type="text"
                  id="alias-input"
                  name="alias"
                  placeholder="my-brand"
                  pattern="[A-Za-z0-9_\-]{3,30}"
                  maxlength="30"
                  aria-label="Custom alias"
                />
              </div>
            </div>
            <div class="field-group">
              <label for="ttl-input">Expires in (days)</label>
              <input
                type="number"
                id="ttl-input"
                name="ttl_days"
                placeholder="Never"
                min="1"
                max="3650"
                aria-label="Expiry in days"
              />
            </div>
          </div>
        </div>
      </form>

      <!-- Result -->
      <div id="result-box" class="result-box hidden" role="alert" aria-live="polite">
        <div class="result-row">
          <a id="short-url-display" href="#" target="_blank" rel="noopener noreferrer" id="short-link-anchor"></a>
          <button id="copy-btn" class="btn-copy" aria-label="Copy short URL" title="Copy to clipboard">
            <span id="copy-icon">⎘</span>
          </button>
        </div>
        <div class="result-meta">
          <span id="expiry-label" class="meta-badge hidden"></span>
          <button class="btn-ghost" id="view-stats-btn">View stats →</button>
        </div>
      </div>

      <!-- Error -->
      <div id="error-box" class="error-box hidden" role="alert" aria-live="assertive">
        <span id="error-message"></span>
      </div>
    </section>

    <!-- Stats Section -->
    <section class="card stats-card hidden" id="stats-section" aria-label="URL Statistics">
      <h2 class="section-title">Link Analytics</h2>
      <div class="stats-lookup">
        <input
          type="text"
          id="stats-code-input"
          placeholder="Enter short code (e.g. aB3kX2m)"
          aria-label="Short code for stats"
        />
        <button id="fetch-stats-btn" class="btn-primary btn-sm">Lookup</button>
      </div>
      <div id="stats-result" class="stats-result hidden">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="stat-clicks">—</div>
            <div class="stat-label">Total Clicks</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-created">—</div>
            <div class="stat-label">Created</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-expires">—</div>
            <div class="stat-label">Expires</div>
          </div>
        </div>
        <div class="stat-detail">
          <div class="stat-detail-row">
            <span class="detail-label">Original URL</span>
            <a id="stat-long-url" class="detail-value link-ellipsis" href="#" target="_blank" rel="noopener noreferrer"></a>
          </div>
        </div>
        <div class="recent-clicks">
          <h3>Recent Clicks</h3>
          <table class="clicks-table" id="clicks-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>IP</th>
                <th>User Agent</th>
              </tr>
            </thead>
            <tbody id="clicks-tbody"></tbody>
          </table>
          <p id="no-clicks-msg" class="no-clicks hidden">No clicks recorded yet.</p>
        </div>
      </div>
      <div id="stats-error" class="error-box hidden"></div>
    </section>
  </main>

  <footer class="footer">
    <p>Built with Flask &amp; SQLite · <a href="https://github.com" target="_blank" rel="noopener">GitHub</a></p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
